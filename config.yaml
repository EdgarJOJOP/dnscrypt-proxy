# ============================================================
# DNS 加密代理 - 全局配置文件（支持热加载）
# 修改文件后自动检测变更并应用
# ============================================================

server:
  # 本地 DoH 服务（HTTPS 加密 DNS）
  doh:
    enabled: true
    host: 127.0.0.1              # IPv4 监听地址
    port: 8443                  # DoH 端口
    path: /dns-query
    cert_path: certs/localhost.crt
    key_path: certs/localhost.key
    # IPv6 支持（同时监听 IPv6）
    ipv6:
      enabled: true
      host: ::1
      port: 8443

  # 本地 DoT 服务（DNS over TLS，RFC 7858）
  dot:
    enabled: false               # 默认关闭，设为 true 开启
    host: 127.0.0.1             # IPv4 监听地址
    port: 853                   # 标准 DoT 端口
    domain: ''                  # 服务器域名（SNI），留空则使用证书 CN
    cert_path: certs/localhost.crt
    key_path: certs/localhost.key
    ipv6:
      enabled: false
      host: ::1
      port: 853

  # 本地 DoQ 服务（DNS over QUIC，RFC 9250）
  doq:
    enabled: false               # 默认关闭，设为 true 开启
    host: 127.0.0.1             # IPv4 监听地址
    port: 784                   # 标准 DoQ 端口
    domain: ''                  # 服务器域名（SNI），留空则使用证书 CN
    cert_path: certs/localhost.crt
    key_path: certs/localhost.key
    ipv6:
      enabled: false
      host: ::1
      port: 784

  # 本地纯 DNS 服务器（UDP 53，不加密，默认关闭）
  plain_dns:
    enabled: true               # 默认关闭，设为 true 开启
    host: 127.0.0.1             # IPv4 监听地址
    port: 53                    # 标准 DNS 端口（需要管理员权限）
    ipv6:
      enabled: false
      host: ::1

# ============================================================
# 上游 DNS 服务器
# 并行查询所有启用的上游，取最快响应
# ============================================================
upstream:
  # bootstrap DNS：仅用于解析 DoH/DoT/DoQ 服务器的 IP 地址
  # 包含 IPv4 + IPv6 双栈 DNS 服务器
  bootstrap_resolvers:
    - 9.9.9.9
    - 223.5.5.5
    - 114.114.114.114
    - 119.29.29.29
    - 2400:3200::1
    - 2001:dc7:1000::1

  # ============================================================
  # 上游优选配置
  # ============================================================
  preferred_count: 5          # 优选上游数量（全类型混排选最低延迟，后缀去重）
  bootstrap_compare: true     # 是否对比 IPv4/IPv6 bootstrap 延迟后选择更快者
  suffix_dedup: true          # 优选时是否避免选中相同后缀域名的上游

  doh:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    - https://dns.adguard-dns.com/dns-query
    - https://dns.cloudflare.com/dns-query
    - https://dns11.quad9.net/dns-query
    - https://sm2.doh.pub/dns-query          # 腾讯国密SM2加密DNS
    - https://doh.360.cn/dns-query
    - https://doh.dns.sb/dns-query
  dot:
    - dns.alidns.com
    - dot.pub
    - dot.sb
    - dns.adguard-dns.com
    - one.one.one.one
    - 1dot1dot1dot1.cloudflare-dns.com
  doq:
    - quic://dns9.quad9.net:853
    - quic://dns.caliph.dev:853
    - quic://dns.alidns.com:853
    - quic://dns-unfiltered.adguard.com:853
cache:
  enabled: true
  max_size: 10000           # 最大缓存条目数，超限 LRU 淘汰
  default_ttl: 300          # 默认缓存时间（秒）
  min_ttl: 30               # 最小缓存时间（秒）
  max_ttl: 86400            # 最大缓存时间（秒）
  negative_ttl: 60          # 负面应答缓存时间（秒）
  cleanup_interval: 60      # 过期清理间隔（秒）

# ============================================================
# DNSSEC 验证配置
# ============================================================
dnssec:
  enabled: true                     # 全局 DNSSEC 验证开关
  # 验证模式:
  #   ad_check       - 仅检查 AD 位（快速，依赖上游验证）
  #   strict         - 严格本地验证 RRSIG 签名链（安全但较慢）
  mode: strict
  # 是否丢弃验证失败的响应（bogus）
  drop_bogus: true

# ============================================================
# 自定义域名映射（白名单功能，类似 Windows hosts 文件）
#
# ⚠️ 白名单功能：在此 mappings 中列出的域名将绕过所有过滤规则！
#    即使有拦截规则（如 ||123.com^ 或 *.123.com），也不会被拦截。
#
# 支持两种格式：
#
#   格式1（纯域名白名单 - 绕过过滤，正常解析）:
#     - "123.com"
#     仅填写域名，不指定 IP。该域名将绕过所有过滤规则，正常通过上游 DNS 解析。
#     适用于：某些网站被拦截规则误杀导致无法访问时，强制放行。
#
#   格式2（自定义 IP 映射 - 直接返回指定 IP）:
#     - "my.dns 127.0.0.1,192.168.1.1"
#     域名 + 空格 + IP（多个IP用逗号分隔）。直接返回指定 IP，完全跳过过滤和上游解析。
#     适用于：内网域名解析、开发测试环境、广告服务器重定向等。
#
# 支持 IPv4 和 IPv6
# 运行时修改此配置会自动热加载，无需重启程序
# ============================================================
hosts:
  enabled: true
  mappings:
    # 白名单示例：只写域名，不写 IP，绕过 ||123.com^ 等拦截规则
    # - "123.com"
    # - "fe-static.deepseek.com"
    # - "example.com"
    # 自定义 IP 示例：
    # - "my.dns 127.0.0.1,192.168.1.1"
    # - "router.local 192.168.1.1"
    # - "ipv6test.local ::1"

# ============================================================
# 域名过滤规则（AdGuard Home 语法）
# ============================================================
filter:
  enabled: true
  # 规则文件路径（支持本地文件和远程 URL）
  rules_files:
  # 远程规则列表（定时自动更新）
  rules_urls:
    # 注释掉的全网收集的adguard拦截规则总和，容易误拦截
    #- https://proxy.gitwarp.top/https://raw.githubusercontent.com/hululu1068/AdGuard-Rule/main/rule/all.txt
    - https://cdn.jsdelivr.net/gh/hululu1068/AdGuard-Rule@main/rule/domain.txt
  update_interval: 24
  # 是否拦截后返回 NXDOMAIN
  block_nxdomain: true
  # 自定义拦截页面 IP（NXDOMAIN 模式下无效）
  block_ip: 0.0.0.0

# ============================================================
# 请求日志（异步缓冲写入）
# ============================================================
logging:
  enabled: true
  buffer_size: 500          # 内存缓冲条目数，达到后写入文件并清空
  flush_interval: 10        # 定时刷新间隔（秒）
  log_dir: logs
  log_file: dns_queries.log
  detailed: true
  max_log_size_mb: 10      # 日志文件最大大小（MB），超限自动裁剪保留后半部分

# ============================================================
# TLS/SSL 配置（加密连接参数）
# ============================================================
tls:
  # Encrypted Client Hello（加密客户端问候）
  # 防止 SNI 明文泄露导致的域名嗅探和干扰
  # 注意：需要 OpenSSL 4.0+ 才能真正启用 ECH
  ech_enabled: false
  # 密码套件（默认安全配置）
  ciphers: HIGH:!aNULL:!kRSA:!PSK:!SRP:!MD5:!RC4
  # OpenSSL 4.0 DLL 路径（用于上游 ECH 连接）
  # 下载: https://github.com/TaurusTLS-Developers/OpenSSL-Distribution/releases/tag/v4.0.0
  # 解压后将 libssl-4-x64.dll 和 libcrypto-4-x64.dll 所在目录填在这里
  # 支持正斜杠和反斜杠两种格式:
  #   Windows: "D:/dns/openssl4" 或 'D:\dns\openssl4' 或 "D:\\dns\\openssl4"
  #   Linux:   "/usr/local/openssl4"
  openssl4_dll_path: D:/dns/1/dnscrypt-proxy/openssl-4.0.0-Windows-x64
  # 留空则尝试使用 certifi（推荐）: pip install certifi(默认安装了)
  ca_path: ''

  # ============================================================
  # ECH 配置（每台上游服务器）
  # 支持 3 种格式:
  #   1. Base64 编码的 ECHConfigList（静态配置）
  #      "dns.alidns.com": "AFj+DQAAAC..."
  #   2. DNS 查询 URL（自动查询此上游的 HTTPS 记录）
  #      "dns.cloudflare.com": "https://dns.alidns.com/dns-query"
  #   3. hostname+DNS 查询（查询指定 hostname 的 HTTPS 记录）
  #      "dns.cloudflare.com": "cloudflare-ech.com+https://cloudflare-ech.com/dns-query"
  # ============================================================
  ech:
    # Cloudflare DNS 的 ECH 配置：查询 cloudflare-ech.com 的 HTTPS 记录
    dns.cloudflare.com: cloudflare-ech.com+https://cloudflare-ech.com/dns-query
    1dot1dot1dot1.cloudflare-dns.com: 
      cloudflare-ech.com+https://cloudflare-ech.com/dns-query

# ============================================================
# 网络连通性监控（自动恢复上游服务器连接）
# 多IP/多网关场景下，IP/网关变更后自动检测并恢复
# ============================================================
network_monitor:
  enabled: true
  ping_interval: 0.05       # 网关检测间隔（秒，0.01 = 10ms）
  external_interval: 15     # 外网 ping/DNS 探测间隔（秒）
  ping_timeout: 0.085       # ping 超时（秒，与 ping_interval 一致）
  # ICMP ping 检测目标（IPv4 + IPv6 双栈）
  ping_targets_v4:
    - 223.5.5.5
    - 114.114.114.114
  ping_targets_v6:
    - 2400:3200::1
    - 2400:da00::6666
  dns_probe_domains:
    - www.baidu.com
    - www.qq.com
  failure_threshold: 3
  # 退出降级需要连续成功检测次数
  recovery_check_count: 2
  # ============================================================
  # Destination Unreachable 快速断网检测
  # 当光猫仍在运行但光纤已断开时，光猫会对外网 ping 回复 ICMP
  # type=3 (Destination Unreachable)。启用此选项后，收到来自网关
  # 的 Destination Unreachable 立即判定为 WAN 断连，跳过滑动窗口等待。
  # ============================================================
  detect_destination_unreachable: true
  # 认为是断网的 ICMP 不可达代码（0=Network Unreachable, 1=Host Unreachable）
  unreachable_codes: [0, 1]

  # ============================================================
  # ARP 防护（检测并修复因 ARP 投毒/IP 冲突导致的网络中断）
  # 当 ping 检测失败但本地网卡配置正常时:
  #   1. 检测本机 ARP 表是否被 MITM 篡改（对比网关 MAC 预期值）
  #   2. 爆发 GARP 广播强制刷新路由器 ARP 表
  #   3. 检测 IP 冲突并自动修复
  #   4. 两阶段 IP 切换抗持续 ARP 中毒
  # 支持多网关/多网卡场景。支持 Windows / Linux。
  # ============================================================
  arp_protection:
    enabled: true                  # ARP 防护总开关
    # 手动指定网关（自动探测的高优先级替代）
    # 格式: "网关IP,网关MAC,VLAN_ID" (英文逗号隔开), 留空则自动探测
    # VLAN_ID 默认为空（无 VLAN/VXLAN）；vxlan_enabled=true 时解释为 VXLAN VNI
    # 多组: "IP1,MAC1,VLAN1,IP2,MAC2,VLAN2" (交替逗号隔开), 适配多网关场景
    # 例如: "192.168.1.1,00-11-22-33-44-55,12"    IP+MAC+VLAN 12
    #       "192.168.1.1,00-11-22-33-44-55,"       IP+MAC, 无 VLAN
    #       "192.168.1.1,,"                        仅 IP, MAC/VLAN 自动
    #       多组: "192.168.1.1,aa-bb,10,10.0.0.1,cc-dd,20"
    # 注意: 只填 IP 不填 MAC, 自动探测 MAC; 都留空则完全自动探测
    vxlan_enabled: false           # false=VLAN(802.1Q), true=VXLAN(VNI)
    gateway: ''

  # ============================================================
  # NDP 防护（IPv6 版 ARP 防护 — 邻居发现协议欺骗防护）
  # 当 ping 检测失败但本地网卡正常时，检测 IPv6 NDP 缓存是否被投毒，
  # 发送 Unsolicited NA 刷新路由器邻居表，设静态 NDP 条目防篡改。
  #
  # 覆盖攻击面（RFC 3756）:
  #   T1  NA 欺骗       — 常驻嗅探实时基线比对
  #   T2  NS 欺骗       — 主动 NS 探测验证网关真实性
  #   T3  RA 欺骗       — 非信任 MAC 源发 RA 即告警（源 MAC 自动学习）
  #   T4  DAD DoS       — 追踪 DAD NS 重复地址检测
  #   T5  NUD 失败      — 窗口内 NS 重传超阈值告警
  #   T6  Redirect 欺骗 — 非信任源 Redirect 丢弃
  #   T7  NDP 泛洪      — 邻居表增长率超限检测
  #   T8  Replay 攻击   — 静态 NDP 条目终局防御
  #   T9  Rogue DHCPv6  — Event 驱动嗅探检测
  # 5 个常驻 Worker，Event 驱动，不用就冻结。
  # 需要安装 Npcap 以使用 scapy 发包（否则降级为 ping 等效方案）。
  # ============================================================
  ndp_protection:
    enabled: true                 # 默认开启，未检测到 IPv6 时自动关闭
    # 手动指定 IPv6 网关（自动探测的高优先级替代）
    # 格式: "网关IPv6,网关MAC,VLAN_ID" (英文逗号隔开), 留空则自动探测
    # VLAN_ID 默认为空（无 VLAN/VXLAN）；vxlan_enabled=true 时解释为 VXLAN VNI
    # IPv6 与 MAC 的区分: MAC 为 6 组 2 位十六进制数 (xx:xx:xx:xx:xx:xx)
    #                      IPv6 含 :: 或超过 2 个冒号
    # 示例:
    #   "2001:db8::1,00-11-22-33-44-55,100"      指定 IPv6 + MAC + VLAN 100
    #   "2001:db8::1,00-11-22-33-44-55,"         指定 IPv6 + MAC, 无 VLAN
    #   "2001:db8::1,,"                           指定 IPv6, MAC/VLAN 自动探测
    #   "fe80::1,aa-bb,10,2001:db8::1,cc-dd,20"  多组（3 元素交替格式）
    vxlan_enabled: false           # false=VLAN(802.1Q), true=VXLAN(VNI)
    gateway_ipv6: ''
    # NUD 检测窗口（毫秒），内网 <1ms，默认 80
    # 窗口内追踪对网关的 NS 重传次数，超过 nud_threshold 则触发告警（T5）
    nud_window_ms: 80
    # NUD 失败阈值：窗口内 NS 重传超过此数则告警，默认 3
    nud_threshold: 3
    # 基线 MAC 学习确认时间（毫秒），默认 1
    # 首次捕获到网关 NA 后等待此时间确认 MAC 稳定，再写入静态 NDP 条目
    baseline_learn_ms: 1
    # 主动 NS 探测：构造 NS 查询验证网关真实性，检测 T2 NS 欺骗攻击
    # 有 scapy 时必启用
    send_ns_probe: true

  # ============================================================
  # DNS 响应验证（多上游一致性 + 统计异常检测）
  # 检测加密 DNS 响应是否被投毒或篡改。
  # 原理：
  #   1. 多上游交叉一致性 — 对同一 DNS 查询，比较多个独立加密上游的响应指纹
  #   2. 统计异常检测 — RTT/响应大小/TTL 的基线偏差分析
  # ============================================================
  response_verification:
    # 多上游交叉一致性验证
    consistency:
      enabled: true              # 总开关
      min_responses: 2           # 最少需要几个响应才做一致性校验
      consistency_window_ms: 800 # 首响应后等待其他响应的窗口（毫秒）
      # 后台验证最多查询的上游数（随机抽样，减少连接数暴涨）
      max_background_servers: 5

    # 统计异常检测（RTT/大小/TTL 基线）
    anomaly_detection:
      enabled: true              # 总开关
      learning_samples: 200      # 基线学习阶段的样本数
      z_score_threshold: 3.0     # z-score 超过此值视为异常



# ============================================================
# 性能与资源优化
# ============================================================
performance:
  parallel_timeout: 2.0     # 并行查询超时（秒）
  max_concurrent: 1000      # 最大并发查询数（受 Windows 句柄数限制，需注册表调整 HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\Ancillary Function Driver for Winsock\Parameters\MaxUserPort，默认 16384，建议 ≥30000）
  max_concurrent_per_ip: 50 # 单 IP 最大并发查询数（127.0.0.1 和 ::1 除外）
  connection_pool_size: 1000 # 连接池大小（同时打开的上游连接数，每个 TCP 连接消耗 2-3 个句柄）
  memory_limit_mb: 768      # 内存软限制（MB）
  cpu_core_limit: 0         # CPU 核心限制（0=自动=总核心数-1；手动设置如 4 表示最多用 4 核）
  monitor_interval: 30      # 资源监控间隔（秒）
  aggressive_gc: true       # 低负载时主动 GC
  gc_interval: 60           # GC 触发间隔（秒）
  # ============================================================
  # QPS 限速（每秒请求数上限，0=无限制）
  # 所有客户端（含 localhost）共同遵守
  # ============================================================
  doh_qps_limit: 1000       # 本地DoH 每秒最多处理 1000 个请求
  dot_qps_limit: 500        # 本地DoT 每秒最多处理 500 个请求
  doq_qps_limit: 500        # 本地DoQ 每秒最多处理 500 个请求
  # ============================================================
  # 连接数上限（防止恶意客户端耗尽连接池）
  # ============================================================
  dot_max_connections: 200  # 本地DoT 最大并发 TCP 连接数
  doq_max_connections: 100  # 本地DoQ 最大 QUIC 连接数
