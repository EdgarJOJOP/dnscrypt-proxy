# ============================================================
# DNS 加密代理 - 全局配置文件（支持热加载）
# 修改文件后自动检测变更并应用
# ============================================================

server:
  # 本地 DoH 服务（HTTPS 加密 DNS）
  doh:
    enabled: true
    host: "127.0.0.1"            # IPv4 监听地址
    port: 8443                  # DoH 端口
    path: "/dns-query"
    cert_path: "certs/localhost.crt"
    key_path: "certs/localhost.key"
    # IPv6 支持（同时监听 IPv6）
    ipv6:
      enabled: true
      host: "::1"
      port: 8443

  # 本地 DoT 服务（DNS over TLS，RFC 7858）
  dot:
    enabled: false               # 默认关闭，设为 true 开启
    host: "127.0.0.1"           # IPv4 监听地址
    port: 853                   # 标准 DoT 端口
    domain: ""                  # 服务器域名（SNI），留空则使用证书 CN
    cert_path: "certs/localhost.crt"
    key_path: "certs/localhost.key"
    ipv6:
      enabled: false
      host: "::1"
      port: 853

  # 本地 DoQ 服务（DNS over QUIC，RFC 9250）
  doq:
    enabled: false               # 默认关闭，设为 true 开启
    host: "127.0.0.1"           # IPv4 监听地址
    port: 784                   # 标准 DoQ 端口
    domain: ""                  # 服务器域名（SNI），留空则使用证书 CN
    cert_path: "certs/localhost.crt"
    key_path: "certs/localhost.key"
    ipv6:
      enabled: false
      host: "::1"
      port: 784

  # 本地纯 DNS 服务器（UDP 53，不加密，默认关闭）
  plain_dns:
    enabled: false               # 默认关闭，设为 true 开启
    host: "127.0.0.1"           # IPv4 监听地址
    port: 53                    # 标准 DNS 端口（需要管理员权限）
    ipv6:
      enabled: false
      host: "::1"

# ============================================================
# 上游 DNS 服务器
# 并行查询所有启用的上游，取最快响应
# ============================================================
upstream:
  # bootstrap DNS：仅用于解析 DoH/DoT/DoQ 服务器的 IP 地址
  # 包含 IPv4 + IPv6 双栈 DNS 服务器
  bootstrap_resolvers:
    - "9.9.9.9"
    - "223.5.5.5"               # 阿里 DNS (IPv4)
    - "114.114.114.114"         # 114 DNS (IPv4)
    - "119.29.29.29"            # 腾讯 DNS (IPv4)
    - "2400:3200::1"            # 阿里 DNS (IPv6)
    - "2400:da00::6666"         # 114 DNS (IPv6)

  # DNS over HTTPS
  doh:
    - "https://dns.alidns.com/dns-query"
    - "https://doh.pub/dns-query"
    - "https://dns.adguard-dns.com/dns-query"
    - "https://dns.cloudflare.com/dns-query"
    - "https://dns11.quad9.net/dns-query"

  # DNS over TLS
  dot:
    - "dns.alidns.com"
    - "dns.pub"
    - "dns.adguard-dns.com"
    - "one.one.one.one"
    - "1dot1dot1dot1.cloudflare-dns.com"

  # DNS over QUIC
  doq:
    - "quic://dns9.quad9.net:853"         # Quad9 DoQ（已验证可用）
    - "quic://dns.caliph.dev:853"
    - "quic://dns.alidns.com:853"         # 阿里 DNS（部分环境可能不支持）

# ============================================================
# DNS 缓存配置
# ============================================================
cache:
  enabled: true
  max_size: 10000           # 最大缓存条目数，超限 LRU 淘汰
  default_ttl: 300          # 默认缓存时间（秒）
  min_ttl: 30               # 最小缓存时间（秒）
  max_ttl: 86400            # 最大缓存时间（秒）
  negative_ttl: 60          # 负面应答缓存时间（秒）
  cleanup_interval: 60      # 过期清理间隔（秒）

# ============================================================
# DNSSEC 验证配置
# ============================================================
dnssec:
  enabled: true                     # 全局 DNSSEC 验证开关
  # 验证模式:
  #   ad_check       - 仅检查 AD 位（快速，依赖上游验证）
  #   strict         - 严格本地验证 RRSIG 签名链（安全但较慢）
  mode: "ad_check"
  # 是否丢弃验证失败的响应（bogus）
  drop_bogus: false

# ============================================================
# 自定义域名 IP 映射（类似 Windows hosts 文件）
# 格式: "域名 IP1,IP2" (域名和IP用空格分隔,多IP用逗号)
# 支持 IPv4 和 IPv6
# ============================================================
hosts:
  enabled: false
  mappings:
    # - "my.dns 127.0.0.1,192.168.1.1"
    # - "router.local 192.168.1.1"
    # - "ipv6test.local ::1"

# ============================================================
# 域名过滤规则（AdGuard Home 语法）
# ============================================================
filter:
  enabled: true
  # 规则文件路径（支持本地文件和远程 URL）
  rules_files:
  # 远程规则列表（定时自动更新）
  rules_urls:
    - "https://proxy.gitwarp.top/https://raw.githubusercontent.com/hululu1068/AdGuard-Rule/main/rule/all.txt"
    # AdGuard 官方推荐规则列表（按需启用）
    # - "https://adguardteam.github.io/AdGuardSDNSFilter/Filters/filter.txt"
    # - "https://raw.githubusercontent.com/AdguardTeam/FiltersRegistry/master/filters/filter_2_Chinese/filter.txt"
    # - "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
  # 远程规则更新间隔（小时，0=不自动更新）
  update_interval: 24
  # 是否拦截后返回 NXDOMAIN
  block_nxdomain: true
  # 自定义拦截页面 IP（NXDOMAIN 模式下无效）
  block_ip: "0.0.0.0"

# ============================================================
# 请求日志（异步缓冲写入）
# ============================================================
logging:
  enabled: true
  buffer_size: 500          # 内存缓冲条目数，达到后写入文件并清空
  flush_interval: 10        # 定时刷新间隔（秒）
  log_dir: "logs"
  log_file: "dns_queries.log"
  detailed: true
  max_log_size_mb: 10      # 日志文件最大大小（MB），超限自动裁剪保留后半部分

# ============================================================
# TLS/SSL 配置（加密连接参数）
# ============================================================
tls:
  # Encrypted Client Hello（加密客户端问候）
  # 防止 SNI 明文泄露导致的域名嗅探和干扰
  # 注意：需要 OpenSSL 4.0+ 才能真正启用 ECH
  ech_enabled: false
  # 密码套件（默认安全配置）
  ciphers: "HIGH:!aNULL:!kRSA:!PSK:!SRP:!MD5:!RC4"
  # OpenSSL 4.0 DLL 路径（用于上游 ECH 连接）
  # 下载: https://github.com/TaurusTLS-Developers/OpenSSL-Distribution/releases/tag/v4.0.0
  # 解压后将 libssl-4-x64.dll 和 libcrypto-4-x64.dll 所在目录填在这里
  # 支持正斜杠和反斜杠两种格式:
  #   Windows: "D:/dns/openssl4" 或 'D:\dns\openssl4' 或 "D:\\dns\\openssl4"
  #   Linux:   "/usr/local/openssl4"
  openssl4_dll_path: "D:/dns/1/dnscrypt-proxy/openssl-4.0.0-Windows-x64"
  # 留空则尝试使用 certifi（推荐）: pip install certifi(默认安装了)
  ca_path: ""

  # ============================================================
  # ECH 配置（每台上游服务器）
  # 支持 3 种格式:
  #   1. Base64 编码的 ECHConfigList（静态配置）
  #      "dns.alidns.com": "AFj+DQAAAC..."
  #   2. DNS 查询 URL（自动查询此上游的 HTTPS 记录）
  #      "dns.cloudflare.com": "https://1.1.1.1/dns-query"
  #   3. hostname+DNS 查询（查询指定 hostname 的 HTTPS 记录）
  #      "dns.cloudflare.com": "cloudflare-ech.com+https://1.1.1.1/dns-query"
  # ============================================================
  ech:
    # Cloudflare DNS 的 ECH 配置：查询 cloudflare-ech.com 的 HTTPS 记录
    "dns.cloudflare.com": "cloudflare-ech.com+https://1.1.1.1/dns-query"
    "1dot1dot1dot1.cloudflare-dns.com": "cloudflare-ech.com+https://1.1.1.1/dns-query"

# ============================================================
# 网络连通性监控（自动恢复上游服务器连接）
# 多IP/多网关场景下，IP/网关变更后自动检测并恢复
# ============================================================
network_monitor:
  enabled: true
  ping_interval: 0.01       # 网关检测间隔（秒，0.01 = 10ms）
  external_interval: 15     # 外网 ping/DNS 探测间隔（秒）
  ping_timeout: 1          # ping 超时（秒）
  # ICMP ping 检测目标（IPv4 + IPv6 双栈）
  ping_targets_v4:
    - "223.5.5.5"
    - "114.114.114.114"
  ping_targets_v6:
    - "2400:3200::1"
    - "2400:da00::6666"
  # DNS 探测域名（向公共 DNS 发送 DNS 查询验证）
  dns_probe_domains:
    - "www.baidu.com"
    - "www.qq.com"
  # 连续检测失败多少次后进入降级模式
  failure_threshold: 3
  # 退出降级需要连续成功检测次数
  recovery_check_count: 2

  # ============================================================
  # ARP 防护（检测并修复因 ARP 投毒/IP 冲突导致的网络中断）
  # 当 ping 检测失败但本地网卡配置正常时:
  #   1. 检测本机 ARP 表是否被 MITM 篡改（对比网关 MAC 预期值）
  #   2. 爆发 GARP 广播强制刷新路由器 ARP 表
  #   3. 检测 IP 冲突并自动修复
  #   4. 两阶段 IP 切换抗持续 ARP 中毒
  # 支持多网关/多网卡场景。支持 Windows / Linux。
  # ============================================================
  arp_protection:
    enabled: true                  # ARP 防护总开关
    # 手动指定网关（自动探测的高优先级替代）
    # 格式: "网关IP,网关MAC" (英文逗号隔开), 留空则自动探测
    # 多组: "IP1,MAC1,IP2,MAC2" (交替逗号隔开), 适配多网关场景
    # 例如: "192.168.1.1,00-11-22-33-44-55"
    #       多组: "192.168.1.1,00-11-22-33-44-55,10.0.0.1,aa-bb-cc-dd-ee-ff"
    #       或者: "192.168.1.1,"
    # 注意: 只填 IP 不填 MAC, 自动探测 MAC; 都留空则完全自动探测
    gateway: ""

# ============================================================
# 性能与资源优化
# ============================================================
performance:
  parallel_timeout: 2.0     # 并行查询超时（秒）
  max_concurrent: 1000      # 最大并发查询数（受 Windows 句柄数限制，需注册表调整 HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\Ancillary Function Driver for Winsock\Parameters\MaxUserPort，默认 16384，建议 ≥30000）
  max_concurrent_per_ip: 50 # 单 IP 最大并发查询数（127.0.0.1 和 ::1 除外）
  connection_pool_size: 1000 # 连接池大小（同时打开的上游连接数，每个 TCP 连接消耗 2-3 个句柄）
  memory_limit_mb: 512      # 内存软限制（MB）
  cpu_core_limit: 0         # CPU 核心限制（0=自动=总核心数-1；手动设置如 4 表示最多用 4 核）
  cpu_usage_limit: 70       # CPU 使用率软限制（%，已弃用，由 cpu_core_limit 替代）
  monitor_interval: 30      # 资源监控间隔（秒）
  aggressive_gc: true       # 低负载时主动 GC
  gc_interval: 60           # GC 触发间隔（秒）
  # ============================================================
  # QPS 限速（每秒请求数上限，0=无限制）
  # 所有客户端（含 localhost）共同遵守
  # ============================================================
  doh_qps_limit: 1000       # 本地DoH 每秒最多处理 1000 个请求
  dot_qps_limit: 500        # 本地DoT 每秒最多处理 500 个请求
  doq_qps_limit: 500        # 本地DoQ 每秒最多处理 500 个请求
  # ============================================================
  # 连接数上限（防止恶意客户端耗尽连接池）
  # ============================================================
  dot_max_connections: 200  # 本地DoT 最大并发 TCP 连接数
  doq_max_connections: 100  # 本地DoQ 最大 QUIC 连接数
